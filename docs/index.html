<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boxing Timer">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Boxing Timer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --st: env(safe-area-inset-top,    0px);
  --sb: env(safe-area-inset-bottom, 0px);
  --sl: env(safe-area-inset-left,   0px);
  --sr: env(safe-area-inset-right,  0px);
}
html, body { height:100%; overscroll-behavior:none; -webkit-user-select:none; user-select:none; }

/* ── HOME SCREEN ────────────────────────────────────────────────────── */
#home-screen {
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: calc(var(--st)+20px) calc(var(--sr)+20px) calc(var(--sb)+20px) calc(var(--sl)+20px);
  transition: background 0.4s;
}
#home-screen.fighting { background: #0a1a0a; }
#home-screen.resting  { background: #1a0a0a; }
#home-screen.warning  { background: #1a1200; }

h1 {
  font-size: clamp(.75rem,3vw,1.1rem);
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #555;
  margin-bottom: clamp(16px,4vh,40px);
}
#phase {
  font-size: clamp(.8rem,3.5vw,1.1rem);
  letter-spacing: 4px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 10px;
  min-height: 1.4em;
  transition: color .3s;
}
#phase.fight { color:#4cff72; }
#phase.rest  { color:#ff4c4c; }
#phase.ready { color:#888; }

#clock {
  font-size: clamp(72px,20vw,180px);
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: -4px;
  transition: color .3s;
  color: #fff;
}
#clock.warning { color:#ffcc00; }
#clock.rest    { color:#ff4c4c; }

#round-info {
  margin-top: clamp(10px,2vh,20px);
  font-size: clamp(.75rem,3vw,1rem);
  letter-spacing: 3px;
  color: #666;
  text-transform: uppercase;
}
#round-info span { color:#aaa; }

#dots {
  display:flex; gap:8px; margin-top:14px;
  flex-wrap:wrap; justify-content:center; max-width:360px;
}
.dot {
  width:10px; height:10px; border-radius:50%;
  background:#222; border:2px solid #333;
  transition: background .3s, border-color .3s;
}
.dot.done    { background:#4cff72; border-color:#4cff72; }
.dot.current { background:#ffcc00; border-color:#ffcc00; }

.controls {
  display:flex; gap:12px;
  margin-top: clamp(24px,5vh,50px);
  flex-wrap:wrap; justify-content:center;
}
button {
  border:none; border-radius:12px;
  font-size: clamp(.85rem,3.5vw,1rem);
  font-weight:700; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; min-height:52px; min-width:52px;
  padding:14px 24px;
  transition: transform .1s, opacity .2s;
  -webkit-touch-callout:none;
}
button:active { transform:scale(.94); opacity:.85; }

#btn-start { background:#4cff72; color:#000; min-width:130px; }
#btn-start.paused { background:#ffcc00; }
#btn-reset { background:#1a1a1a; color:#aaa; border:2px solid #333; }
#btn-cam-toggle {
  background:#1a1a1a; color:#aaa; border:2px solid #333;
  font-size:1.1rem; padding:14px 18px; letter-spacing:0;
}
#btn-cam-toggle.on { border-color:#4cff72; color:#4cff72; }

#settings {
  margin-top: clamp(20px,4vh,48px);
  background:#111; border:1px solid #222; border-radius:16px;
  padding:20px 24px;
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px 24px;
  width:100%; max-width:420px;
}
.setting label {
  display:block; font-size:.65rem; letter-spacing:2px;
  text-transform:uppercase; color:#555; margin-bottom:6px;
}
.setting input {
  width:100%; background:#0a0a0a; border:1px solid #333; border-radius:8px;
  color:#fff; font-size:clamp(1rem,4vw,1.2rem); font-weight:700;
  text-align:center; padding:10px 4px; outline:none;
  -webkit-appearance:none; min-height:44px;
}
.setting input:focus { border-color:#4cff72; }
#warning-label {
  margin-top: clamp(16px,3vh,32px);
  font-size:.65rem; color:#333; letter-spacing:2px; text-transform:uppercase;
}

/* ── CAM SCREEN ─────────────────────────────────────────────────────── */
#cam-screen {
  position:fixed; inset:0; z-index:10;
  background:#000;
  display:flex; flex-direction:column;
}
#cam-screen.hidden { display:none; }

#cam-video {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  transform: scaleX(-1);
}

/* gradient bars so text is readable over any background */
#cam-top {
  position:relative; z-index:2;
  padding: calc(var(--st)+12px) calc(var(--sr)+16px) 16px calc(var(--sl)+16px);
  background: linear-gradient(to bottom, rgba(0,0,0,.75) 0%, transparent 100%);
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
#cam-bottom {
  position:relative; z-index:2; margin-top:auto;
  padding: 16px calc(var(--sr)+16px) calc(var(--sb)+24px) calc(var(--sl)+16px);
  background: linear-gradient(to top, rgba(0,0,0,.8) 0%, transparent 100%);
  display:flex; align-items:center; justify-content:space-around;
}

/* center watermark */
#cam-center {
  position:absolute; z-index:2;
  top:50%; left:50%; transform:translate(-50%,-50%);
  text-align:center; pointer-events:none;
}
#cam-phase-label {
  font-size: clamp(.7rem,3vw,1rem);
  letter-spacing:4px; text-transform:uppercase; font-weight:700;
  color:rgba(255,255,255,.8);
  text-shadow: 0 2px 8px rgba(0,0,0,.9);
  margin-bottom:4px;
}
#cam-clock {
  font-size: clamp(64px,18vw,140px);
  font-weight:900; font-variant-numeric:tabular-nums;
  line-height:1; letter-spacing:-4px;
  color:#fff;
  text-shadow: 0 4px 20px rgba(0,0,0,.9), 0 0 40px rgba(0,0,0,.6);
  transition: color .3s;
}
#cam-clock.warning { color:#ffcc00; }
#cam-clock.rest    { color:#ff4c4c; }

/* round dots on cam screen */
#cam-dots {
  display:flex; gap:6px; justify-content:center; margin-top:10px; flex-wrap:wrap;
}

/* top bar elements */
#btn-home {
  background:rgba(255,255,255,.12); color:#fff;
  border:1px solid rgba(255,255,255,.25); border-radius:10px;
  font-size:.75rem; padding:10px 16px; min-height:44px; letter-spacing:1px;
  backdrop-filter: blur(8px);
}
#cam-round-label {
  font-size:.75rem; letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,255,255,.7); text-shadow:0 1px 6px rgba(0,0,0,.8);
}
#rec-indicator {
  display:none; align-items:center; gap:5px;
  font-size:.7rem; letter-spacing:1px; color:#ff4c4c; font-weight:700;
  text-shadow:0 1px 6px rgba(0,0,0,.8);
}
#rec-indicator.active { display:flex; }
.rec-dot {
  width:8px; height:8px; border-radius:50%; background:#ff4c4c;
  animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }

/* bottom bar buttons */
.cam-btn {
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  border-radius:50%; width:64px; height:64px;
  font-size:1.4rem; color:#fff; display:flex;
  align-items:center; justify-content:center;
  cursor:pointer; backdrop-filter:blur(8px);
  transition: transform .1s, background .2s;
  padding:0; min-width:unset; min-height:unset; letter-spacing:0;
}
.cam-btn:active { transform:scale(.9); }
#btn-cam-pause.active { background:rgba(76,255,114,.25); border-color:#4cff72; }
#btn-cam-rec { font-size:1rem; }
#btn-cam-rec.recording { background:rgba(255,76,76,.3); border-color:#ff4c4c; }

/* ── REPLAY MODAL ───────────────────────────────────────────────────── */
#replay-modal {
  position:fixed; inset:0; z-index:20;
  background:#000;
  display:flex; flex-direction:column;
}
#replay-modal.hidden { display:none; }

#replay-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: calc(var(--st)+12px) calc(var(--sr)+16px) 12px calc(var(--sl)+16px);
  background:#111; border-bottom:1px solid #222;
  gap:8px;
}
#replay-header span {
  font-size:.75rem; letter-spacing:3px; text-transform:uppercase; color:#aaa;
}
#btn-replay-back {
  background:none; border:none; color:#4cff72;
  font-size:.85rem; padding:8px 4px; letter-spacing:1px; min-height:44px;
}
#btn-replay-save {
  background:#4cff72; color:#000; border:none;
  font-size:.75rem; padding:10px 16px; border-radius:8px; min-height:44px;
  letter-spacing:1px;
}

#replay-video {
  width:100%; flex:1; object-fit:contain; background:#000; min-height:0;
}

#clips-list {
  background:#0a0a0a; max-height:35vh; overflow-y:auto;
  border-top:1px solid #1a1a1a;
}
.clip-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px; border-bottom:1px solid #141414;
  cursor:pointer;
}
.clip-item:active { background:#111; }
.clip-thumb {
  width:56px; height:40px; border-radius:6px;
  background:#222; object-fit:cover; flex-shrink:0;
}
.clip-info { flex:1; }
.clip-title { font-size:.8rem; color:#ccc; letter-spacing:1px; }
.clip-duration { font-size:.65rem; color:#555; letter-spacing:1px; margin-top:2px; }
.clip-playing { color:#4cff72; }
</style>
</head>
<body>

<!-- ── HOME SCREEN ──────────────────────────────────────────────────── -->
<div id="home-screen">
  <h1>Boxing Timer</h1>
  <div id="phase" class="ready">Ready</div>
  <div id="clock">3:00</div>
  <div id="round-info">Round <span id="round-num">1</span> / <span id="round-total">12</span></div>
  <div id="dots"></div>
  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-cam-toggle" class="on">&#128247;</button>
  </div>
  <div id="settings">
    <div class="setting">
      <label>Rounds</label>
      <input type="number" id="set-rounds" value="12" min="1" max="20" inputmode="numeric">
    </div>
    <div class="setting">
      <label>Round (min)</label>
      <input type="number" id="set-round-min" value="3" min="1" max="10" inputmode="numeric">
    </div>
    <div class="setting">
      <label>Rest (sec)</label>
      <input type="number" id="set-rest" value="60" min="5" max="120" inputmode="numeric">
    </div>
  </div>
  <div id="warning-label">Warning bell at 10 seconds</div>
</div>

<!-- ── CAM SCREEN ───────────────────────────────────────────────────── -->
<div id="cam-screen" class="hidden">
  <video id="cam-video" autoplay playsinline muted></video>

  <div id="cam-top">
    <button id="btn-home">&#8592; Home</button>
    <div id="cam-round-label">Round 1 / 12</div>
    <div id="rec-indicator"><div class="rec-dot"></div><span id="rec-time">0:00</span></div>
  </div>

  <div id="cam-center">
    <div id="cam-phase-label">Ready</div>
    <div id="cam-clock">3:00</div>
    <div id="cam-dots"></div>
  </div>

  <div id="cam-bottom">
    <button class="cam-btn" id="btn-cam-clips" title="Clips">&#127916;</button>
    <button class="cam-btn" id="btn-cam-pause" title="Pause">&#9646;&#9646;</button>
    <button class="cam-btn" id="btn-cam-rec" title="Record">&#9210;</button>
  </div>
</div>

<!-- ── REPLAY MODAL ─────────────────────────────────────────────────── -->
<div id="replay-modal" class="hidden">
  <div id="replay-header">
    <button id="btn-replay-back">&#8592; Back</button>
    <span id="replay-title">Clip 1</span>
    <button id="btn-replay-save">&#8659; Save</button>
  </div>
  <video id="replay-video" controls playsinline></video>
  <div id="clips-list"></div>
</div>

<script>
// ── Audio ─────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function bell(freq=880, dur=0.8, reps=1, gap=0.3) {
  for (let i=0;i<reps;i++) {
    const t = audioCtx.currentTime + i*(dur+gap);
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(freq,t);
    o.frequency.exponentialRampToValueAtTime(freq*.5,t+dur);
    g.gain.setValueAtTime(.6,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t); o.stop(t+dur);
  }
}
const startBell   = ()=>bell(880,1.0,1);
const endBell     = ()=>bell(660,.6,3,.2);
const warningBell = ()=>bell(1100,.3,1);

// ── Timer state ───────────────────────────────────────────────────────────────
let totalRounds, roundSecs, restSecs;
let currentRound=1, phase='idle', remaining=0;
let interval=null, warnedAt10=false;

function loadSettings() {
  totalRounds = Math.max(1,  parseInt(document.getElementById('set-rounds').value)||12);
  roundSecs   = Math.max(10,(parseInt(document.getElementById('set-round-min').value)||3)*60);
  restSecs    = Math.max(5,  parseInt(document.getElementById('set-rest').value)||60);
}
function fmt(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// ── DOM refs ──────────────────────────────────────────────────────────────────
const homeScreen  = document.getElementById('home-screen');
const camScreen   = document.getElementById('cam-screen');
const replayModal = document.getElementById('replay-modal');

const clockEl    = document.getElementById('clock');
const phaseEl    = document.getElementById('phase');
const roundNum   = document.getElementById('round-num');
const roundTot   = document.getElementById('round-total');
const dotsEl     = document.getElementById('dots');
const btnStart   = document.getElementById('btn-start');

const camClock      = document.getElementById('cam-clock');
const camPhaseLabel = document.getElementById('cam-phase-label');
const camRoundLabel = document.getElementById('cam-round-label');
const camDotsEl     = document.getElementById('cam-dots');

// ── Render ────────────────────────────────────────────────────────────────────
function renderDots(container, count, current) {
  container.innerHTML='';
  for(let i=1;i<=count;i++){
    const d=document.createElement('div');
    d.className='dot';
    if(i<current) d.classList.add('done');
    else if(i===current) d.classList.add('current');
    container.appendChild(d);
  }
}

function updateDisplay() {
  const t = fmt(remaining);
  clockEl.textContent    = t;
  camClock.textContent   = t;
  roundNum.textContent   = currentRound;
  roundTot.textContent   = totalRounds;
  camRoundLabel.textContent = `Round ${currentRound} / ${totalRounds}`;
  renderDots(dotsEl,    totalRounds, currentRound);
  renderDots(camDotsEl, totalRounds, currentRound);

  let phaseText='Ready', phaseClass='ready';
  clockEl.classList.remove('warning','rest');
  camClock.classList.remove('warning','rest');
  homeScreen.classList.remove('fighting','resting','warning');
  phaseEl.classList.remove('fight','rest','ready');

  if(phase==='fighting'){
    phaseText=`Round ${currentRound}`; phaseClass='fight';
    if(remaining<=10){
      clockEl.classList.add('warning'); camClock.classList.add('warning');
      homeScreen.classList.add('warning');
    } else {
      homeScreen.classList.add('fighting');
    }
  } else if(phase==='resting'){
    phaseText='Rest'; phaseClass='rest';
    clockEl.classList.add('rest'); camClock.classList.add('rest');
    homeScreen.classList.add('resting');
  } else if(phase==='done'){
    phaseText='Done!'; phaseClass='fight';
  }

  phaseEl.textContent      = phaseText;
  phaseEl.classList.add(phaseClass);
  camPhaseLabel.textContent = phaseText;
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function tick() {
  remaining--;
  if(phase==='fighting'){
    if(remaining===10&&!warnedAt10){ warningBell(); warnedAt10=true; }
    if(remaining<=0){
      endBell();
      if(currentRound>=totalRounds){
        phase='done'; remaining=0; stopTimer();
        btnStart.textContent='Start'; btnStart.classList.remove('paused');
        document.getElementById('btn-cam-pause').classList.remove('active');
        returnHome();
      } else {
        phase='resting'; remaining=restSecs; warnedAt10=false;
      }
    }
  } else if(phase==='resting'){
    if(remaining<=0){
      currentRound++; phase='fighting'; remaining=roundSecs; warnedAt10=false; startBell();
    }
  }
  updateDisplay();
}
function startTimer(){ if(!interval) interval=setInterval(tick,1000); }
function stopTimer() { clearInterval(interval); interval=null; }

// ── Screen switching ──────────────────────────────────────────────────────────
let camStream=null, camEnabled=true;

async function ensureCamera() {
  if(camStream) return true;
  // Try with audio first (needed for recording with sound).
  // Fall back to video-only if mic is denied (common on iOS first visit).
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
  } catch {
    try {
      camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    } catch { return false; }
  }
  document.getElementById('cam-video').srcObject = camStream;
  return true;
}

function showCamScreen() {
  homeScreen.classList.add('hidden');
  // hide home without removing from layout (we just use display toggling via class)
  homeScreen.style.display='none';
  camScreen.classList.remove('hidden');
}

function returnHome() {
  stopRecording();
  camScreen.classList.add('hidden');
  homeScreen.style.display='';
  updateDisplay();
}

function stopCameraStream() {
  stopRecording();
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  document.getElementById('cam-video').srcObject=null;
}

// ── Home buttons ──────────────────────────────────────────────────────────────
btnStart.addEventListener('click', async ()=>{
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(phase==='done') return;

  if(phase==='idle'){
    loadSettings(); currentRound=1;
    phase='fighting'; remaining=roundSecs; warnedAt10=false;

    if(camEnabled){
      const ok = await ensureCamera();
      if(ok) showCamScreen();
    }

    updateDisplay(); startBell(); startTimer();
    btnStart.textContent='Pause'; btnStart.classList.remove('paused');
    document.getElementById('btn-cam-pause').innerHTML='&#9646;&#9646;';
    document.getElementById('btn-cam-pause').classList.add('active');
  } else if(interval){
    stopTimer();
    btnStart.textContent='Resume'; btnStart.classList.add('paused');
    document.getElementById('btn-cam-pause').innerHTML='&#9654;';
    document.getElementById('btn-cam-pause').classList.remove('active');
  } else {
    startTimer();
    btnStart.textContent='Pause'; btnStart.classList.remove('paused');
    document.getElementById('btn-cam-pause').innerHTML='&#9646;&#9646;';
    document.getElementById('btn-cam-pause').classList.add('active');
  }
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  stopTimer(); loadSettings();
  phase='idle'; currentRound=1; remaining=roundSecs; warnedAt10=false;
  btnStart.textContent='Start'; btnStart.classList.remove('paused');
  returnHome();
  updateDisplay();
});

document.getElementById('btn-cam-toggle').addEventListener('click',()=>{
  camEnabled=!camEnabled;
  const btn=document.getElementById('btn-cam-toggle');
  if(camEnabled){ btn.classList.add('on'); }
  else { btn.classList.remove('on'); stopCameraStream(); }
});

['set-rounds','set-round-min','set-rest'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{
    if(phase==='idle'){ loadSettings(); remaining=roundSecs; updateDisplay(); }
  });
});

// ── Cam screen buttons ────────────────────────────────────────────────────────
document.getElementById('btn-home').addEventListener('click',()=>{
  stopTimer();
  btnStart.textContent='Resume'; btnStart.classList.add('paused');
  returnHome();
});

document.getElementById('btn-cam-pause').addEventListener('click',()=>{
  if(audioCtx.state==='suspended') audioCtx.resume();
  const btn=document.getElementById('btn-cam-pause');
  if(interval){
    stopTimer();
    btnStart.textContent='Resume'; btnStart.classList.add('paused');
    btn.innerHTML='&#9654;'; btn.classList.remove('active');
  } else if(phase!=='done'&&phase!=='idle'){
    startTimer();
    btnStart.textContent='Pause'; btnStart.classList.remove('paused');
    btn.innerHTML='&#9646;&#9646;'; btn.classList.add('active');
  }
});

document.getElementById('btn-cam-clips').addEventListener('click',()=>{
  if(clips.length===0) return;
  openReplay(clips.length-1);
});

// ── Recording ─────────────────────────────────────────────────────────────────
const btnRec       = document.getElementById('btn-cam-rec');
const recIndicator = document.getElementById('rec-indicator');
const recTimeEl    = document.getElementById('rec-time');

let mediaRecorder=null, recChunks=[], recInterval=null, recSeconds=0;
let clips=[]; // [{blob, mimeType, duration}]

function startRecording(){
  if(!camStream) return;
  if(typeof MediaRecorder==='undefined') return; // not supported
  recChunks=[]; recSeconds=0;

  // iOS Safari only supports video/mp4; Chrome/Android prefer webm.
  // Don't use isTypeSupported on iOS — it can lie. Try mp4 first, catch and retry.
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||
               (navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  const mimeOrder = isIOS
    ? ['video/mp4','']
    : ['video/webm;codecs=vp9,opus','video/webm','video/mp4',''];

  let created=false;
  for(const mime of mimeOrder){
    try {
      mediaRecorder = mime
        ? new MediaRecorder(camStream,{mimeType:mime})
        : new MediaRecorder(camStream);
      created=true; break;
    } catch {}
  }
  if(!created) return;

  mediaRecorder.ondataavailable=e=>{ if(e.data&&e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop=()=>{
    const mtype=mediaRecorder.mimeType||'video/mp4';
    const blob=new Blob(recChunks,{type:mtype});
    clips.push({blob, mimeType:mtype, duration:recSeconds});
    addClipToList(clips.length-1);
  };

  // iOS works better without a timeslice — collect all data at stop
  if(isIOS) mediaRecorder.start();
  else mediaRecorder.start(500);

  recIndicator.classList.add('active');
  btnRec.classList.add('recording');
  btnRec.innerHTML='&#9209;';
  recInterval=setInterval(()=>{ recSeconds++; recTimeEl.textContent=fmt(recSeconds); },1000);
}

function stopRecording(){
  if(!mediaRecorder||mediaRecorder.state==='inactive') return;
  mediaRecorder.stop();
  clearInterval(recInterval); recInterval=null;
  recIndicator.classList.remove('active');
  btnRec.classList.remove('recording');
  btnRec.innerHTML='&#9210;';
  recTimeEl.textContent='0:00';
}

btnRec.addEventListener('click',()=>{
  if(!camStream) return;
  if(mediaRecorder&&mediaRecorder.state==='recording') stopRecording();
  else startRecording();
});

// ── Replay modal ──────────────────────────────────────────────────────────────
const replayVideo    = document.getElementById('replay-video');
const replayTitle    = document.getElementById('replay-title');
const btnReplaySave  = document.getElementById('btn-replay-save');
const clipsList      = document.getElementById('clips-list');
let activeClipIdx    = -1;

function addClipToList(idx){
  const c=clips[idx];
  const url=URL.createObjectURL(c.blob);
  const item=document.createElement('div');
  item.className='clip-item'; item.dataset.idx=idx;

  // thumbnail via video seek
  const thumb=document.createElement('video');
  thumb.className='clip-thumb';
  thumb.src=url; thumb.muted=true; thumb.playsInline=true;
  thumb.currentTime=0.1;

  const info=document.createElement('div'); info.className='clip-info';
  const title=document.createElement('div'); title.className='clip-title';
  title.textContent=`Clip ${idx+1}`;
  const dur=document.createElement('div'); dur.className='clip-duration';
  dur.textContent=fmt(c.duration);
  info.append(title,dur);
  item.append(thumb,info);
  item.addEventListener('click',()=>openReplay(idx));
  clipsList.appendChild(item);
}

function openReplay(idx){
  stopTimer();
  returnHome();  // hide cam screen first
  activeClipIdx=idx;
  const c=clips[idx];
  const url=URL.createObjectURL(c.blob);
  replayVideo.src=url;
  replayTitle.textContent=`Clip ${idx+1}`;
  replayModal.classList.remove('hidden');
  // highlight active clip
  document.querySelectorAll('.clip-item').forEach((el,i)=>{
    el.querySelector('.clip-title').classList.toggle('clip-playing',i===idx);
  });
}

document.getElementById('btn-replay-back').addEventListener('click',()=>{
  replayVideo.pause();
  replayModal.classList.add('hidden');
  if(phase!=='idle'&&phase!=='done'){
    // return to cam screen if timer was running
    showCamScreen();
  }
});

btnReplaySave.addEventListener('click', async ()=>{
  if(activeClipIdx<0) return;
  const c=clips[activeClipIdx];
  const ext=c.mimeType.includes('mp4')?'mp4':'webm';
  const filename=`boxing-clip-${activeClipIdx+1}.${ext}`;
  const file=new File([c.blob],filename,{type:c.mimeType});

  // Web Share API → iOS share sheet → Save Video to camera roll
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:'Boxing Clip'}); return; }
    catch(e){ if(e.name==='AbortError') return; }
  }
  // Fallback: download link
  const url=URL.createObjectURL(c.blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
});

// ── Drag PiP not needed (cam is full screen) ──────────────────────────────────

// ── Service Worker ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── Init ──────────────────────────────────────────────────────────────────────
loadSettings();
remaining=roundSecs;
updateDisplay();
// auto-start camera stream in background so it's ready
ensureCamera();
</script>
